version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - supabase-db
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  supabase-db:
    image: supabase/postgres:15.1.1.78
    ports:
      - "54322:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pulse
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  # For full Supabase local dev, use the Supabase CLI instead:
  #   npx supabase start
  # This spins up Auth, Storage, Realtime, and PostgREST on port 54321.

volumes:
  supabase-db-data:
