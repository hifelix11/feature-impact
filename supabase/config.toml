[project]
id = "pulse-feature-impact"
name = "Pulse - Feature Impact Tracker"

# Note: This config is used by the Supabase CLI for migrations and linking.
# The actual database runs on Supabase Cloud — no local containers needed.
# Use `npx supabase link --project-ref <ref>` to connect, then `npx supabase db push`.

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "50MiB"
